<div class="app-shell">
  @if (!isAuthRoute()) {
    <header class="topbar">
      <a class="brand" routerLink="/">Car Rental</a>
      <nav class="links">
        @if (auth.isAdmin()) {
          <a routerLink="/admin/users" routerLinkActive="active">{{ 'users' | t }}</a>
          <a routerLink="/admin/cars" routerLinkActive="active">{{ 'cars' | t }}</a>
          <a routerLink="/admin/orders" routerLinkActive="active">{{ 'orders' | t }}</a>
        } @else if (auth.isCustomer()) {
          <a routerLink="/cars" routerLinkActive="active">{{ 'cars' | t }}</a>
          <a routerLink="/orders" routerLinkActive="active">{{ 'myOrders' | t }}</a>
          <a routerLink="/installments" routerLinkActive="active">{{ 'installments' | t }}</a>
        }
      </nav>
      <div class="actions">
        <button type="button" class="btn btn-ghost btn-sm" (click)="i18n.toggleLanguage()">
          {{ i18n.locale() | uppercase }}
        </button>
        <button type="button" class="btn btn-ghost btn-sm" (click)="theme.toggleTheme()">{{ 'darkMode' | t }}</button>
        @if (auth.token()) {
          <button type="button" class="btn btn-ghost btn-sm" (click)="logout()">{{ 'logout' | t }}</button>
        }
      </div>
    </header>
  }
  <main class="main-container">
    <router-outlet />
  </main>
  </div>
